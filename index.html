<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Choose your language for the Japan Tax Refund Calculator and official duty-free guide.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Tax Refund Calculator - Language Selector</title>
    <link rel="canonical" href="https://refundjapan.com/" />
    <link rel="alternate" hreflang="zh-Hans" href="https://refundjapan.com/zhj/" />
    <link rel="alternate" hreflang="zh-Hant" href="https://refundjapan.com/zhf/" />
    <link rel="alternate" hreflang="en" href="https://refundjapan.com/en/" />
    <link rel="alternate" hreflang="ja" href="https://refundjapan.com/ja/" />
    <link rel="alternate" hreflang="ko" href="https://refundjapan.com/ko/" />
    <link rel="alternate" hreflang="th" href="https://refundjapan.com/th/" />
    <link rel="alternate" hreflang="x-default" href="https://refundjapan.com/" />
    <style>
        :root {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.92);
            --text: #1e293b;
            --text-soft: #64748b;
            --border: #dbe4ee;
            --primary: #1e1b4b;
            --primary-soft: #312e81;
            --accent: #3b82f6;
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 30%),
                radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.08), transparent 24%),
                var(--bg);
            color: var(--text);
        }

        .shell {
            width: 100%;
            max-width: 620px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.08);
            color: var(--primary-soft);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(30px, 5vw, 42px);
            line-height: 1.1;
            color: var(--text);
        }

        p {
            margin: 0;
            color: var(--text-soft);
            line-height: 1.7;
            font-size: 15px;
        }

        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 24px 0 16px;
        }

        .lang-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text);
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
            transition: transform 0.2s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .lang-btn:hover,
        .lang-btn:focus {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14), 0 10px 24px rgba(15, 23, 42, 0.06);
            outline: none;
        }

        .hint {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-soft);
        }
    </style>

    <base href="/">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q6231P53QB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-Q6231P53QB');
    </script>
</head>
<body>
    <main class="shell">
        <div class="badge">Official multilingual entry</div>
        <h1>Japan Tax Refund Calculator</h1>
        <p>Please select your language / 请选择您的语言</p>

        <div class="lang-grid">
            <a class="lang-btn" href="/zhj/">简体中文</a>
            <a class="lang-btn" href="/zhf/">繁體中文</a>
            <a class="lang-btn" href="/en/">English</a>
            <a class="lang-btn" href="/ja/">日本語</a>
            <a class="lang-btn" href="/ko/">한국어</a>
            <a class="lang-btn" href="/th/">ไทย</a>
        </div>

        <div class="hint">Choose the language you are most comfortable using before calculating your refund.</div>
    </main>
</body>
</html>
